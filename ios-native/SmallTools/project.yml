name: SmallTools
options:
  bundleIdPrefix: fyi.imdaniel
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
targets:
  SmallTools:
    type: application
    platform: iOS
    sources:
      - SmallTools
    info:
      path: SmallTools/Info.plist
      properties:
        CFBundleDisplayName: Small Tools
        UILaunchScreen: {}
        CFBundleURLTypes:
          - CFBundleTypeRole: Editor
            CFBundleURLName: fyi.imdaniel.smalltools
            CFBundleURLSchemes:
              - smalltools
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: fyi.imdaniel.smalltools.native
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        DEVELOPMENT_TEAM: S26BJ6U5YF
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.9"
